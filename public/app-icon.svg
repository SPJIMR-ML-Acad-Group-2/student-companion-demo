<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Purple brand background -->
  <rect width="40" height="40" rx="9" fill="#531F75"/>

  <!-- Left page of open book -->
  <path d="M20 11 Q13.5 9.5 8.5 11 L8.5 27.5 Q13.5 26 20 27 Z" fill="#F58220"/>

  <!-- Right page (slightly transparent for depth) -->
  <path d="M20 11 Q26.5 9.5 31.5 11 L31.5 27.5 Q26.5 26 20 27 Z" fill="#F58220" fill-opacity="0.55"/>

  <!-- Spine -->
  <line x1="20" y1="11" x2="20" y2="27" stroke="#531F75" stroke-width="1.5"/>

  <!-- Checkmark on left page (attendance) -->
  <polyline
    points="11,18.5 13.8,21.5 18.5,15"
    stroke="white"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="0.9"
  />
</svg>
